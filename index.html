<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .gradient-text {
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">

    <nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-xl font-bold tracking-tighter uppercase">Portfolio<span class="text-blue-400">.</span></span>
            <div class="space-x-8 hidden md:block">
                <a href="#home" class="hover:text-blue-400 transition">Home</a>
                <a href="#skills" class="hover:text-blue-400 transition">Skills</a>
                <a href="#projects" class="hover:text-blue-400 transition">Projects</a>
                <a href="#contact" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-full transition">Contact</a>
            </div>
        </div>
    </nav>

    <section id="home" class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-24">
        <div class="mb-8 relative">
            <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 rounded-full"></div>
            <img src="1000002203.jpg" alt="Profile Photo" class="relative w-40 h-40 md:w-48 md:h-48 rounded-full object-cover border-4 border-slate-800 shadow-2xl">
        </div>

        <div class="inline-block px-3 py-1 mb-4 border border-blue-500/30 bg-blue-500/10 rounded-full text-blue-400 text-sm font-medium">
            Available for New Projects
        </div>
        
        <h1 class="text-4xl md:text-6xl font-extrabold mb-6 leading-tight">
            Hi, I'm <span class="gradient-text">Sugam Thapa</span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mb-10 leading-relaxed">
            A dedicated educator and developer bridging the gap between <br class="hidden md:block"> 
            **Advanced Mathematics** and **Modern Software Logic**.
        </p>

        <div class="flex flex-col md:flex-row gap-4">
            <a href="#projects" class="px-8 py-4 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-500 transition shadow-lg shadow-blue-900/20">
                View My Projects
            </a>
            <a href="#contact" class="px-8 py-4 bg-slate-800 border border-slate-700 font-bold rounded-lg hover:bg-slate-700 transition">
                Get In Touch
            </a>
        </div>
    </section>

    <footer id="contact" class="py-20 border-t border-slate-800">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <h2 class="text-3xl font-bold mb-8">Connect With Me</h2>
            <div class="flex justify-center gap-6 mb-8">
                <a href="#" class="text-slate-400 hover:text-blue-400 transition"><i data-lucide="github"></i></a>
                <a href="#" class="text-slate-400 hover:text-blue-400 transition"><i data-lucide="linkedin"></i></a>
                <a href="#" class="text-slate-400 hover:text-blue-400 transition"><i data-lucide="mail"></i></a>
            </div>
            <p class="text-slate-500 text-sm">© 2026 Professional Portfolio</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
